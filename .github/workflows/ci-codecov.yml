name: CI + Codecov

permissions:
  contents: read

on:
  push:
    branches: ["master", "dev"]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 25
      RELEASE_PACKAGE_NAME: "@bitcredit/ui-library"
      REPOSITORY_URL: "git+https://github.com/BitcreditProtocol/ui.git"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js (${{ env.NODE_VERSION }})
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Check code style
        id: style_check
        run: npm run style:check
        continue-on-error: true

      - name: Lint
        id: lint_check
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Test
        id: test_check
        run: npm run test -- --coverage
        continue-on-error: true

      - name: Stage release package
        run: |
          mkdir -p release/package
          cp -R dist release/package/dist
          cp package.json release/package/package.json
          cp README.md release/package/README.md
          cd release/package
          npm pkg set name="${RELEASE_PACKAGE_NAME}"
          npm pkg set version="0.0.0-ci"
          npm pkg delete private
          npm pkg set repository.type=git
          npm pkg set repository.url="${REPOSITORY_URL}"

      - name: Verify release package
        working-directory: release/package
        run: npm pack --dry-run

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

      - name: Fail if deferred checks failed
        if: ${{ always() }}
        shell: bash
        run: |
          FAILED=0

          if [[ "${{ steps.style_check.outcome }}" == "failure" ]]; then
            echo "Style check failed."
            FAILED=1
          fi

          if [[ "${{ steps.lint_check.outcome }}" == "failure" ]]; then
            echo "Lint failed."
            FAILED=1
          fi

          if [[ "${{ steps.test_check.outcome }}" == "failure" ]]; then
            echo "Tests failed."
            FAILED=1
          fi

          exit "$FAILED"
